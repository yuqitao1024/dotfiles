# run first: git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm

# 启用鼠标支持
set -g mouse on

# 历史记录行数
set -g history-limit 10000

# 窗口和面板索引从 1 开始
set -g base-index 1
setw -g pane-base-index 1

# 减少按键延迟
set -s escape-time 0

# 终端颜色支持
set-option -g default-terminal "screen-256color"

# 状态栏样式
set -g status-style bg=black,fg=white
set -g status-left-length 30
set -g status-right-length 150

# 左侧显示：会话名称
set -g status-left "#[fg=green]#S #[fg=yellow]|#[default]"

# 右侧显示：日期时间
set -g status-right "#[fg=cyan]%Y-%m-%d %H:%M:%S#[default]"

# TPM 插件列表
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

set -g @plugin 'egel/tmux-gruvbox'
# set desired theme options...
set -g @tmux-gruvbox 'dark256' # or 'dark256', 'light', 'light256'

# 分割窗口快捷键
bind | split-window -h    # 垂直分割
bind - split-window -v    # 水平分割

# 重载配置文件
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# 必须放在配置文件末尾
run '~/.tmux/plugins/tpm/tpm'
